      Jeg kan godt skrive under på at der kommer tilmeldinger via siden her, så det er er godt sted at starte. Men ellers hvis du har andre sider, så find andre sider af samme nice og tilbyd dem et link fra en af disse sider hvis de linker til dit link katalog evt. smid et toplink med her i starten. Og på selve link kataloget tilbyd toplink hvis der linkes tilbage. Opret et twitter profil og facebook side for link kataloget og sæt twitterfeed til at poste links til alle nye oprettelser, så du får link til alle de sider. Ellers så står den på tilmelding i andre link kataloger og skrive artikler. ;o)
