  - author: Ulla
    date: "18/10-2018 - 13:34"
    content: "Det vil jeg arbejde lidt videre med. 1000 tak for hjælpen!"
    avatar_url: "https://secure.gravatar.com/avatar/bab29fa4f7470bcbecbf3d344fbc77bdf72c70ce29aca8f10a8b7b3d9a9c4a28?s=96&d=mm&r=g"
    author_url: "https://www.kristianna.dk"
  - author: Jacob Worsøe
    date: "18/10-2018 - 11:41"
    content: "Hej Ulla og mange tak! Umiddelbart er dine billeder godt optimeret og du får også en fin score på 86/100, så den er tæt på at være i mål. Du kan dog optimere billederne yderligere. Hvis du indtaster http://www.kristianna.dk/galleri.html i https://webspeedtest.cloudinary.com får du dette resultat: https://webspeedtest.cloudinary.com/results/181018_TM_68a914b5ad23c65c8282a91574a25aa6 Her kan du se at billederne på siden tilsammen fylder 161 KB og kan optimeres ned til 41 KB. Derunder kan du se de enkelte billeder og downloade den optimerede version af de enkelte billeder. Her bør du bruge JPEG da de andre versioner kun virker i nogle browsere. Så kan du presse de sidste kilobyte ud af billederne og få en optimal load tid. Håber det kan bruges?"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "http://www.jacobworsoe.dk"
  - author: Ulla
    date: "06/10-2018 - 12:29"
    content: "1000 tak for den superpædagogiske introduktion til responsivt design. Mit projekt (redesign til mobilvenlighed) har jeg netop søsat med enkelte skønhedspletter, fordi jeg skønner, at det et vigtigere at blive mobilvenlig end perfekt. Jeg tester selv med godt resultat på iphone og smartphone, og google anerkender mobilvenligheden &#8211; MEN cirka hveranden gang erklærer googles test, at der er (vekslende) problemer med indlæsning, dog udelukkende på de tre galleri-oversigter med små-billeder. Jeg har mindsket fil-størrelserne dramatisk, men ville være glad, hvis nogen eventuelt kan sige, om der er noget i det lidt primitive stylesheet, der evt. kan begrunde, at smartphones (ifølge google) af og til ikke er helt tilfreds, eller hvis der er andre åbenlyse svagheder: http://www.kristianna.dk"
    avatar_url: "https://secure.gravatar.com/avatar/bab29fa4f7470bcbecbf3d344fbc77bdf72c70ce29aca8f10a8b7b3d9a9c4a28?s=96&d=mm&r=g"
    author_url: "http://www.kristianna.dk"
