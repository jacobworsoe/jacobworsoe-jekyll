    content: |-
      Puh. Det her er handy info. Sidder og skal redirecte et site her i næste uge for en kunde, og gruer altid for det.. Det er så nemt at overse noget! Har du forresten en kilde på den del omkring 75% linkjuice? Troede ikke det var SÅ meget der gik tabt?
    avatar_url: https://www.gravatar.com/avatar/8e851daff00a5712236167be1ba0a13a?s=96&d=mm&r=g
    author_url: ''
  - author: Jacob Worsøe
    date: 03/07-2015 - 10:49
    content: |-
      Det officielle svar fra Google er at der mistes lige meget link juice i et link og et redirect: https://www.youtube.com/watch?v=Filv4pP-1nw Det lyder på Matt Cutts som om det er 10-15% der mistes. Min erfaring er dog at der mistes lidt mere gennem et redirect. Dette ses fx når et site får et nyt domæne. Så oplever jeg ofte at det giver et mindre tab i PageRank og rankings på det nye site, selvom alle sider er redirected korrekt. Men det er svært at sige præcis hvor meget tab der er, men lidt tab er der, så der er god grund til at få rettet linket, så det peger rigtigt.
    avatar_url: https://www.gravatar.com/avatar/6c0a0aa8df43f6419e1fcbe4c21740c9?s=96&d=mm&r=g
