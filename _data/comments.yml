    content: "Det er et fint hack, til at tracke robotter med, det erstatter ikke v&aelig;rdien af en logfil n&aring;r lorten rammer ventilatoren og man skal finde en fejl. I det tilf&aelig;lde er det kun god gammeldags logfilanalyse der virker."
    avatar_url: "https://secure.gravatar.com/avatar/2f4ceaf6571f8d41950c87969bbe302ae8f7a417b0545eb8a04d2d3027e4090d?s=96&d=mm&r=g"
    author_url: "http://www.internetguru.dk/"
  - author: Vadsk&aelig;r
    date: "15/01-2010 - 10:03"
    content: "N&aring;e ja &#8211; det starter du jo ogs&aring; hele showet med. Alts&aring; at lave en ny profil. Det er generelt en god id&eacute;, n&aring;r man g&aring;r i gang med den slags cirkus-kunstner. Synes stadig &#8211; det er et sjovt hack. Skal bestemt afpr&oslash;ve det selv."
    avatar_url: "https://secure.gravatar.com/avatar/753f93263a27e926469cd03a1703c63969d6dd5f1c0a562e4d411eeb620b0fc9?s=96&d=mm&r=g"
    author_url: "http://blog.v4d5.net"
  - author: Jacob Wors&oslash;e
    date: "15/01-2010 - 09:59"
    content: "Vadsk&aelig;r: Hvis du t&aelig;nker p&aring; at det &oslash;del&aelig;gger ens statistik (f.eks. giver en lavere konverteringsrate) s&aring; skal du ikke v&aelig;re nerv&oslash;s. Fordi man laver en ny profil til at have dem i, s&aring; bliver de ikke talt med i ens oprindelige profil, s&aring; den indeholder fortsat kun &quot;rigtige&quot; mennesker. Alt det her bliver udelukkende registreret under den profil som hedder &quot;robots.jacobworsoe.dk&quot; eller hvad man nu v&aelig;lger at kalde den :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Vadsk&aelig;r
    date: "15/01-2010 - 07:51"
    content: "H&aelig;&#8230; Sjovt lille hack. Man skal lige v&aelig;re opm&aelig;rksom p&aring; at disse bot-bes&oslash;g vil h&aelig;ve antallet af ens sidevisninger. Som s&aring;dan ikke nogen katastrofe, men man b&oslash;r lige holde det i baghovedet."
