real-time-404-tracking-med-google-tag-manager:
  - author: Jacob Worsøe
    date: "28/06-2016 - 23:51"
    content: "Hej Jacob. Helt enig, redirects bør altid sættes op baseret på besøgte sider i GA, kombineret med sider med indgående links. Det er bare ikke altid nok&#8230; Vi lancerede et nyt site forleden dag. Der var lavet redirects, baseret på besøgte sider i GA for de sidste 2 år, men et par dage inden skiftet til nyt site, blev der lanceret en ny kampagne med landingpage, som derfor ikke var med i listen fra GA. Siden fik masser af trafik fra AdWords og e-mails og blev fanget med det samme i real-time GA. Kun to brugere nåede at se 404 siden, inden der var opsat redirect!﻿"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
