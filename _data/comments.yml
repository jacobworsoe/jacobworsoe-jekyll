  - author: Jacob Worsøe
    date: 16/02-2010 - 14:22
    content: |-
      Rasmus: Tak for din kommentar og jeg beklager det sene svar. Jeg skal være ærlig og sige at jeg ikke har haft statistik på et højt nok niveau til at jeg kan forklare matematikken bag ved de udregningen, men bare forstå hvordan man bruger hypotese-test. Derfor har jeg været nødt til at lave mere eller mindre direkte oversættelser af enkelte dele. Det er taget herfra: "The 80% confidence level is what determines the width of the range. It is what allows us to say, with 95% confidence, that a range that exceeds and does not overlap another range will outperform the other range." Jeg er dog selv nysgerrig efter at finde ud af mere af den bagved liggende matematik, så jeg vil lige prøve at skrive en mail til Google og høre om de kan komme med en forklaring der er til at forstå :)
