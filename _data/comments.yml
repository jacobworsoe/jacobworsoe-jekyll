case-saadan-oegede-vi-vores-e-mail-liste-med-217-mens-sitet-var-nede:
  - author: Jacob Worsøe
    date: "03/06-2015 - 10:06"
    content: "Bjarke: Tak for input, og jeg er helt enig. Et andet godt eksempel er kvitteringssiden på webshops, som oftest er en blindgyde. Den er oplagt at bruge aktivt til at få mere værdi ud af kunderne. På ExchangeMyCoins.com bruger vi den til at få kundernes umiddelbare feedback efter købet. Det er guld værd! Vi får masser af gode idéer til nye features ind den vej og masser af værdifulde testimonials ud af det, som giver social proof: https://www.exchangemycoins.com/pages/testimonials"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Bjarke Klüwer
    date: "13/05-2015 - 01:05"
    content: "Det er en fin erfaring at få &#8211; og tak for at du deler den :) Princippet bag, at altid udnytte de virtuelle ejendomme, du har til rådighed, er i værd at huske på. Disse virtuelle ejendomme findes mange steder. Desværre kan de være lidt svære at finde, hvis man ikke aktivt leder efter dem. Her er nogle eksempler på ejendom, som kan udnyttes, f.eks. til at indsamle tilmeldinger til et nyhedsbrev, vise reklamer, opfordre til at &#8220;Synes godt om&#8221; en gruppe på Facebook, osv.: 1) PS. i emails. 2) Statusopdateringer på Facebook. 3) På takkesider der vises efter tilmelding til f.eks. et nyhedsbrev. 4) Downloadsider. 5) &#8230; og mange andre. Kort sagt: Tænk altid på at brugeren/modtageren/besøgeren aldrig må ledes ind i en blindgyde, men altid blive tilbudt at gøre noget som er i din interesse (og sin egen for den sags skyld)."
    avatar_url: "https://secure.gravatar.com/avatar/a389f01651a2496ca807038a4bae5420c790ef9b6b56b5389c1409c981c554f2?s=96&d=mm&r=g"
    author_url: "http://www.bjarkekluwer.dk"

