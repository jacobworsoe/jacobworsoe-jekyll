  - author: Jeppe
    date: "02/08-2015 - 13:25"
    content: "Okay &#8211; tak for linket! Har også før oplevet at kunder har mistet ret gode placeringer når de beslutter sig for at skifte til et nyt domæne.. Ikke altid de godtager svadaen om tabt linkjuice :P"
    avatar_url: "https://secure.gravatar.com/avatar/f64615a4134c6abce8e251f162e61ca7e66214d3006e906bbd67332c762b0ccf?s=96&d=mm&r=g"
    author_url: 
  - author: Jacob Worsøe
    date: "03/07-2015 - 10:49"
    content: "Det officielle svar fra Google er at der mistes lige meget link juice i et link og et redirect: https://www.youtube.com/watch?v=Filv4pP-1nw Det lyder på Matt Cutts som om det er 10-15% der mistes. Min erfaring er dog at der mistes lidt mere gennem et redirect. Dette ses fx når et site får et nyt domæne. Så oplever jeg ofte at det giver et mindre tab i PageRank og rankings på det nye site, selvom alle sider er redirected korrekt. Men det er svært at sige præcis hvor meget tab der er, men lidt tab er der, så der er god grund til at få rettet linket, så det peger rigtigt."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
