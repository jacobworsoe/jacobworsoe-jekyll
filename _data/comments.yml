    content: |-
      Det er MEGET forskelligt hvor hurtigt Google opdaterer efter 301 redirects. Jeg har lige tjekket et site vi flyttede for omkring et år siden. Der var 10.000+ indekserede sider, og i skrivende øjeblik er der stadig 4 indekserede sider på det gamle domæne. Jeg har lige testet den ene side og den svarer med 301 og når man tilgår linket kommer man korrekt over på den nye URL. Men altså omkring et år efter har Google stadig ikke opdateret det hele endnu.
