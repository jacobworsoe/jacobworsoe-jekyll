    content: "Sikke et arbejde, du har lagt der! Det er ikke en s&aelig;rligt sikker metode at benytte PageRank som en parameter for v&aelig;rdien. Et site (ogs&aring; et katalog) kan sagtens have en PR p&aring; 2-3-4-5 uden at v&aelig;re i stand til at &quot;parse linkjuice&quot;. Og faktisk er det ogs&aring; muligt at have masser af indekserede sider p&aring; et site, der ikke parser linkjuice. Eneste reelle testmulighed er at lave et testlink med en spooky ankertekst og s&aring; vente (nogle uger m&aring;ske) og se, om destinationssiden dukker op i SERPs. Nogle ganske f&aring; af linkkatalogerne er stadig v&aelig;rd at tilmelde sig som et underlag. Og det er sikkert og vist, at det ikke skader at tilmelde sig &#8211; det maksimale tab er tid :-)"
