  - author: Andreas Linde
    date: "16/06-2011 - 16:14"
    content: "Han taler vist googlelsk :=). Han plejer heller ikke at v&aelig;re S&Aring; teknisk i hans videoer, s&aring; det er vel hvad man kan forvente. Han har det med at svare meget generelt og ikke komme med konkrete tal &#8211; desv&aelig;rre :=)"
