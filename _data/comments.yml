    author_url: "http://linde-media.dk/"
  - author: Jacob Wors&oslash;e
    date: "12/03-2010 - 12:16"
    content: "Nej, han er god til at give politiske svar, som giver lidt ny viden, men uden at afsl&oslash;re for meget om hvordan Google egentlig arbejder :) Men i virkeligheden s&aring; foreg&aring;r det nok s&aring;dan at hvis botten st&oslash;der p&aring; et dofollow link, s&aring; tager den det med tilbage til Google og s&aring; bliver der sendt en anden bot ud og bes&oslash;ge den side. S&aring; det er nok ikke den samme bot der forts&aelig;tter rundt p&aring; nettet. Jeg tror faktsk kun den henter en enkelt side af gangen, ikke engang et helt site. Men det er et interessant emne for det er jo ogs&aring; enormt vigtigt for Googles succes at de kan f&aring; crawler s&aring; mange sider som muligt, p&aring; s&aring; kort tid s&aring; muligt. Ellers vil de jo aldrig have aktuelle resultater."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Michael Kjeldsen
    date: "12/03-2010 - 10:58"
    content: "&#8230; men i virkeligheden s&aring; besvarer han jo ikke det sp&oslash;rgsm&aring;l, som du n&aelig;vner var tanken: &quot;Man snakker jo meget om nofollow links som deres bots ikke skal f&oslash;lge, men hvad s&aring; med dofollow links? Betyder de s&aring; at botten f&oslash;lger det link hvor det end f&oslash;rer hen og crawler den side den rammer, for derefter at finde det n&aelig;ste dofollow link og se hvor det f&oslash;rer hen.&quot; Det er et interessant sp&oslash;rgsm&aring;l, og et interessant svar (jeg havde regnet med v&aelig;sentlig flere &quot;robotter der banker p&aring;&quot; end 1.000, men jeg forst&aring;r mig heller ikke p&aring; den tekniske del af s&oslash;gerobotterne :-)"
    avatar_url: "https://secure.gravatar.com/avatar/073825231cab21019a8de63b5382c97410983809fcf801eaaec2479d39be2216?s=96&d=mm&r=g"
