hvor-hurtigt-fanger-google-en-301:
  - author: Jacob Worsøe
    date: "03/09-2013 - 06:11"
    content: "Interessant Thomas. Så var min test jo faktisk i den hurtige ende :) Som jeg skrev i indlægget, så er jeg ved at holde øje med et stort site på 200.000 sider. Det blev flyttet den 29. maj, men nu mere end tre måneder senere er der stadig 28.000 sider indekseret på det gamle domæne, så det tyder virkelig på at Google ikke sætter crawl frekvensen op, så de kan få ryddet op i gamle domæner."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Thomas Frost
    date: "29/08-2013 - 09:04"
    content: "Det er MEGET forskelligt hvor hurtigt Google opdaterer efter 301 redirects. Jeg har lige tjekket et site vi flyttede for omkring et år siden. Der var 10.000+ indekserede sider, og i skrivende øjeblik er der stadig 4 indekserede sider på det gamle domæne. Jeg har lige testet den ene side og den svarer med 301 og når man tilgår linket kommer man korrekt over på den nye URL. Men altså omkring et år efter har Google stadig ikke opdateret det hele endnu."
    avatar_url: "https://secure.gravatar.com/avatar/1bf64ae326adb8ca15a8041537d95cd0d3cfae240092b5710a503a72c4123890?s=96&d=mm&r=g"
    author_url: "http://webcoders.dk"

hvor-meget-drikker-gaesterne-til-et-bryllup:
  - author: Jacob Worsøe
    date: "07/09-2020 - 19:47"
    content: "Hej Susan Vi havde ingen børn med til festen, men der var nogle der kørte som ikke drak, og så er der jo altid nogen der drikker mere og mindre. Men sådan er det nok for de fleste bryllupper, så jeg vil tro beregningen kan bruges til de fleste bryllupper. Men hvis du ved at der er mange på vandvognen (måske mange gravide, som der godt kan være til bryllupper), så kan du nok godt nøjes med lidt mindre. Du kan evt. lave en beregning uden børn og så bare købe lidt sodavand til dem. Håber du får en god fest!"
