      Sikke et arbejde, du har lagt der! Det er ikke en særligt sikker metode at benytte PageRank som en parameter for værdien. Et site (også et katalog) kan sagtens have en PR på 2-3-4-5 uden at være i stand til at "parse linkjuice". Og faktisk er det også muligt at have masser af indekserede sider på et site, der ikke parser linkjuice. Eneste reelle testmulighed er at lave et testlink med en spooky ankertekst og så vente (nogle uger måske) og se, om destinationssiden dukker op i SERPs. Nogle ganske få af linkkatalogerne er stadig værd at tilmelde sig som et underlag. Og det er sikkert og vist, at det ikke skader at tilmelde sig - det maksimale tab er tid :-)
