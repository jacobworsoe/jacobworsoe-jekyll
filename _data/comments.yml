i-naerkontakt-med-matt-cutts:
  - author: Michael Kjeldsen
    date: 12/03-2010 - 10:58
    content: |-
      ... men i virkeligheden så besvarer han jo ikke det spørgsmål, som du nævner var tanken: "Man snakker jo meget om nofollow links som deres bots ikke skal følge, men hvad så med dofollow links? Betyder de så at botten følger det link hvor det end fører hen og crawler den side den rammer, for derefter at finde det næste dofollow link og se hvor det fører hen." Det er et interessant spørgsmål, og et interessant svar (jeg havde regnet med væsentlig flere "robotter der banker på" end 1.000, men jeg forstår mig heller ikke på den tekniske del af søgerobotterne :-)
    avatar_url: https://www.gravatar.com/avatar/2e4f06a8ba540574ad998e9a158c86ff?s=96&d=mm&r=g
    author_url: http://michaelkjeldsen.com
  - author: Jacob Worsøe
    date: 12/03-2010 - 12:16
    content: |-
      Nej, han er god til at give politiske svar, som giver lidt ny viden, men uden at afsløre for meget om hvordan Google egentlig arbejder :) Men i virkeligheden så foregår det nok sådan at hvis botten støder på et dofollow link, så tager den det med tilbage til Google og så bliver der sendt en anden bot ud og besøge den side. Så det er nok ikke den samme bot der fortsætter rundt på nettet. Jeg tror faktsk kun den henter en enkelt side af gangen, ikke engang et helt site. Men det er et interessant emne for det er jo også enormt vigtigt for Googles succes at de kan få crawler så mange sider som muligt, på så kort tid så muligt. Ellers vil de jo aldrig have aktuelle resultater.
    avatar_url: https://www.gravatar.com/avatar/6c0a0aa8df43f6419e1fcbe4c21740c9?s=96&d=mm&r=g
    author_url: https://www.jacobworsoe.dk
