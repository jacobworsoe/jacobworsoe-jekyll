aws-iot-button-google-analytics:
  - author: Jacob Worsøe
    date: "17/12-2019 - 22:20"
    content: "Hej Joachim Mange tak! Jeg købte min på Amazon.co.uk, men jeg kan se den pt. ikke er på lager: https://www.amazon.co.uk/gp/product/B0727NW8HT/ref=ppx_yo_dt_b_asin_title_o01_s02?ie=UTF8&#038;psc=1 Og det ser ud til den slet ikke findes på Amazon.com &#8211; så det kan godt være de er ved at udfase den :("
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "http://www.jacobworsoe.dk"
  - author: Joachim
    date: "17/12-2019 - 22:14"
    content: "Hej Jacob Tak for en spændende artikel😊 Må jeg spørge, hvor du har bestilt din aws IoT knap? Jeg kan desværre ikke rigtig finde et sted, hvor de sender til dk."
    avatar_url: "https://secure.gravatar.com/avatar/a98abed6d41855d961a354bca29eff9ffd676e8d897f4e22d8cc201d3979e04b?s=96&d=mm&r=g"
    author_url: 
  - author: Jacob Worsøe
    date: "24/10-2019 - 21:08"
    content: "Hej Michael og tusing tak for alle dine idéer! Der var sku mange jeg ikke havde tænkt over. Den med Pomodoro-sessions giver rigtig god mening. Jeg plejer bare at bruge https://tomato-timer.com/ men det kunne være fedt med en som havde en API der kunne kalde Measurement Protocol URL&#8217;en når en session var afsluttet. Kender du en? Det giver også rigtig god mening at koble den til TODO lister. Jeg bruger todoist, hvad bruger du? Jeg må lige tjekke om den har et API. I den mere brugbare ende kunne det kobles til task managers, fx Asana, Trello eller lignende. Så kunne man tilføre lidt gamification og se hvem på kontoret der udfører flest opgaver. Og det hele kan selvfølgelig korreleres med kaffe-forbruget, for at finde sweet-spot for antal kopper kaffe :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "http://www.jacobworsoe.dk"
  - author: Michael Kjeldsen
    date: "24/10-2019 - 15:28"
    content: "Sundhedsting (måske i den mere brugbare ende) man kan tracke på denne, eller tilsvarende, måde: &#8211; Vitaminindtag &#8211; Medicinindtag &#8211; Ildebefindende &#8211; Koffeinindtag (bindes sammen med fx mg koffein) &#8211; Væskeindtag generelt (bindes sammen med ml væske) &#8211; Træningspas &#8211; Meditationspas (evt kombineret med antal minutter) Mere sjove end brugbare: &#8211; Besøg til bageren/yndlingscaféen (location based i fx IFTTT) &#8211; Hente/bringe i institutioner &#8211; Ankomst/afgang fra arbejde &#8211; Snackindkøb (fx på arbejde &#8211; kan kombineres med URL Scheme til fx MobilePay) &#8211; Pomodoro-sessioner Der er maser af idéer :-) Jeg laver en del fis (og nogle enkelte seriøse ting) via et hav af forskellige setups, der alle er koblet på en specifik GA-ejendom. Et udvalg af de værktøjer, jeg bruger i mine setups er: &#8211; nfc chips på strategiske placeringer &#8211; IFTTT &#8211; Shortcuts (Genveje-app&#8217;en) &#8211; både manuelle og automatiseringer &#8211; Et hav af API&#8217;er fra de værktøjer, jeg bruger til dagligt, lige fra mine todolister til diverse styringsværktøjer, cms&#8217;er, nyhedsbrevsudsendelser mv. &#8230; Når jeg lige sidder og outliner det her, så tænker jeg på, om jeg måske skulle rydde lidt op&#8230;"
    avatar_url: "https://secure.gravatar.com/avatar/073825231cab21019a8de63b5382c97410983809fcf801eaaec2479d39be2216?s=96&d=mm&r=g"
    author_url: "https://michaelkjeldsen.com/"
  - author: Jacob Worsøe
    date: "23/10-2019 - 21:27"
    content: "Hej Jesper og mange tak for interessen og de pæne ord! Ja, Flic er meget mere brugervenligt, fordi det hele kan laves i deres app, hvorimod AWS kræver at man skal opsætte nogle ting ovre i AWS. Men Flic er bare lidt mere bøvlet/dyr at sætte op, fordi den kræver en Hub. Så det er lidt smag og behag, hvilken løsning der er bedst i situationen, tror jeg. Fed idé at levere noget statistik på dine maskiner. Det kunne også være forbrug over dagen, så man fx kan se om det er sjovest i starten, hvor det er nyt for alle og derefter falder forbruget meget, så man kan give den information med til de næste kunder, så den kan planlægge hvor længe de skal blive ved med at fylde nyt saftevand i maskinen. Fin lille ekstra data-drevet service til kunderne :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "http://www.jacobworsoe.dk"
  - author: Jacob Worsøe
    date: "23/10-2019 - 21:20"
    content: "Hej Ole og tusind tak for din kommentar og interessen for mine indlæg. Det er sådan noget der giver lyst til at skrive endnu mere! Jeg tror du har helt ret! Det kræver to ting: 1. Finde noget interessant at måle. 2. Finde en automatisk måde at måle det på, så det ikke bliver bøvlet at få det tracket. Jeg har også lige købt en Samsung SmartThings hub (det er endelig lanceret i Danmark) og en føler til at sætte på døren, så jeg kan registrere når døren bliver åbnet. I første omgang bruger jeg det til at se hvornår vores hundelufter har gået med hunden og på sigt om pigerne kommer hjem til aftalt tid. Den ældste er dog kun 3 år, men det er godt at være i god tid :) Anyway, den kunne man også tracke i Google Analytics, så det sker helt automatisk. Efter jeg var færdig med cola-projektet, har jeg brugt mine Flic knapper til at styre mine Philips Hue lamper. Vi har en Flic knap i hver vores side af sengen, som vi bruger til at tænde lys om natten, hvis vores mindste datter vågner. Udover at tænde lyset, sender jeg også lige et event til GA, og så kan jeg se hvor meget vi er oppe om natten, og hvem der er bedst til at stå op om natten. Og så lige samlet i et lille dashboard: https://datastudio.google.com/reporting/1mGnK0zuJfz-P2Rhz1NAgsIsZ8QUaxCIQ/page/77dU Det er fedt, fordi det bliver tracket helt automatisk og ikke noget man skal huske. Jeg har ikke leget med Arduino endnu. Men umiddelbart kræver det vel også lidt kode, eller hvordan?"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "http://www.jacobworsoe.dk"
  - author: Jesper
    date: "23/10-2019 - 17:29"
    content: "Jeg er vild med dine artikler! Især har jeg flere gange læst artiklen om flic+cola og henvist til den&#8230; Jeg har det dog som Ole, og ved ikke helt hvad jeg skal måle for at det er begavet derhjemme&#8230; Jeg elsker dog ideen/konceptet i det&#8230; Flic virker umiddelbart mere brugervenligt at sætte op, hvor denne løsning virker nørdet, er det ikke rigtigt? Så det er værd at tage med i overvejelsen, inden jeg går i gang&#8230; Jeg udlejer slush ice maskiner, og det kunne være sjovt med et par knapper på en af maskinerne. Så kunne man lave noget sjov statistik til kunderne &#8211; hvem drikker flest, drengene eller pigerne?"
    avatar_url: "https://secure.gravatar.com/avatar/00c3755fd1e0491fe0f7f10f13cede49f12ea089ec5bf06d5fe750d741dd8fa9?s=96&d=mm&r=g"
    author_url: "https://festbamsen.dk"
  - author: Ole Gregersen
    date: "23/10-2019 - 08:31"
    content: "Hej Jacob. Skøn opfølgning på Flic-artiklen, som jo dengang fik mig til at investere i grejet og kopiere dit GA setup (jeg trackede antal gange jeg gik op af en trappe). Men jeg løb ind i samme &#8220;problem&#8221;, at jeg skulle have telefonen i lommen for at indsamle data, da jeg heller ikke havde hub. Nu kilder det lidt i online-shoppe-fingeren for at købe ovenstående dippedut, selvom jeg må tilstå at jeg nu efterhånden har lært at jeg ikke rigtigt har noget begavet data at indsamle (næsten uden sammenligning i øvrigt). Er lidt ked af at der skal rodes så meget med kode, man kunne drømme om at det var mere plug-and-play &#8211; omend jeg sikkert kunne låne din kode ;-) Det er blevet billigst at købe kontakter og følere osv på nettet, så mon ikke det kan lade sig gøre at konstruere en dims, fx via Arduino eller tilsvarende, som kan føle hvornår kaffekanden bliver løftet? Men det bliver lidt et andet projekt kan jeg godt se. Selv har jeg for nyligt kombineret lysmåler, tids-styringsur og et relæ til noget mere avanceret lysstyring, bare af dimser fra wish.com &#8211; det kostede samlet under 100,- Nå, det var et sidespor. Tak for din historie og for delingen af den. Jeg glæder mig til flere crazy gamifications af dit arbejdsliv. /Ole"
    avatar_url: "https://secure.gravatar.com/avatar/72e2bb948dc996d54e0e6eedfaa68bc39125db959bbb824a3e8ab99a26493147?s=96&d=mm&r=g"
    author_url: "https://www.optuner.dk"

