    author_url: "http://linde-media.dk/"
  - author: Jimmy
    date: "15/02-2011 - 23:01"
    content: "Noget af det bedste man kan g&oslash;re er at s&oslash;rge for at man laver unikke beskrivelser, s&aring; de resterende ikke ogs&aring; kan risikere at blive slagtet.! De tester sikkert alle sammen endnu mere, og dermed er der flere som ryger ud. Jeg g&oslash;r det selv, for tiden er det ca. 60% som ikke bliver godkendt. Det bedste man kan g&oslash;re for at h&aelig;ve v&aelig;rdien af ens link, er at linke tilbage til den underside hvor linket er placeret eller til hovedsiden. Har men flere hjemmesider eller ogs&aring; en blog, kan det g&oslash;res med 3 vejs links som er endnu bedre."
    avatar_url: "https://secure.gravatar.com/avatar/e0898fdd00189fc1496480585517806b3747c0a2d0a968ae399912da60d0d0e2?s=96&d=mm&r=g"
    author_url: "http://w3blog.dk"
  - author: Jimmy Sigenstr&oslash;m
    date: "08/02-2011 - 14:54"
    content: "@Rasmus Link kataloger har altid kun v&aelig;ret en del af en s&oslash;gemaskineoptimering, s&aring; nej det mener jeg ikke det er. Dog mener jeg heller ikke de sidste f&aring;r kniven, hvis de vel og m&aelig;rke forts&aelig;tter den stramme kurs de k&oslash;re med. Og s&oslash;rger for at minimere double content, og d&aring;rlig kvalitet. Men uanset om du bruger dem eller ej, s&aring; er det afg&oslash;rende at din hjemmeside er optimeret. Groft sagt kan man sige, at man reklamere for lor. g&oslash;r det ikke det bedre af. S&aring; hvis din side ikke er i orden, s&aring; f&aring;r du heller ikke det hele ud af dine links. Men links er afg&oslash;rende for din hjemmeside, da det er en m&aring;de at m&aring;le p&aring; hvad andre mener om den."
    avatar_url: "https://secure.gravatar.com/avatar/ee21814e6b403ffada12272cd82df6e1eaaa6a3759d6314982f812ee04785ff4?s=96&d=mm&r=g"
