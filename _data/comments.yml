      En anden god måde at oparbejde nye backlinks, er ved at bruge en eller flere af de blog lister som findes både på dansk og engelsk. Som alle bruger comluv, keywordluv og dofollow. Dog skal man huske at skrive en ordentlig kommentar, så man bidrager til bloggen ellers får nok ikke sin kommentar godkendt. ;-) Da de alle ved de er på disse lister, så de kræver mere end normalt. Men laver man en god kommentar, får man også flere links retur. I forhold til link katlogerne, så check dem for double content inden man bruger tid på at tilmelde sit link da det ellers højest sandsynligt er spild af tid. ;-)
