  - author: Kasper Ebsen
    date: "04/09-2013 - 14:33"
    content: "Det var aldrig sket, hvis løsningen blev lavet hos et bureau med både udviklingsafdeling og en online marketing afdeling under samme tag ;-) #Morten &#8211; Hifiklubben skrev på facebook den. 30 august: &#8220;Kan I lide vores nye hjemmeside? – Den er nu gearet til alle platforme… og vi ved godt, der er fejl hist og her, men vi er godt i gang med at fintune&#8230;&#8221; Så de retter sikkert til på livet løs nu her."
    avatar_url: "https://secure.gravatar.com/avatar/40bda136674516d6f6a51a482551f278cf8f4ac040b4ab0d41f3d5062e36a6d2?s=96&d=mm&r=g"
    author_url: 
  - author: Michael Kjeldsen
    date: "03/09-2013 - 11:46"
    content: "@Jacob, jeg mente faktisk, at man burde trække mappingen tilbage FØR URL&#8217;erne. Det nye website (ny platform?) har én URL-struktur, det gamle website havde en anden &#8211; men der er jo en god chance for, at den bagvedliggende produktstyringsdatabase stadig er den samme. Med den antagelse burde det være muligt at lave en absolut 1:1-mapping af, hvordan gamle og nye URL&#8217;er hører sammen&#8230;?"
    avatar_url: "https://secure.gravatar.com/avatar/073825231cab21019a8de63b5382c97410983809fcf801eaaec2479d39be2216?s=96&d=mm&r=g"
    author_url: "http://michaelkjeldsen.com/"
  - author: Jacob Worsøe
    date: "03/09-2013 - 10:54"
    content: "Michael Kjeldsen: Man kunne godt lave noget logik der matchede nye og gamle URL&#8217;er på baggrund af indholdet i URL&#8217;en, fx produktnavnet i dette tilfælde. Men det kan hurtigt blive svært, fx fordi de i dette tilfælde har fjernet &#8220;5-meter&#8221; fra produktnavnet i den nye URL. Så man kan ikke bare finde exact match og derfor vil det kræve noget logik at finde ud af hvad den nye URL ved at kigge på den gamle URL. Men interessant med systemet som kan holde styr på det her. Skriv endelig hvis du kommer i tanke om nogen der kan det."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Jacob Worsøe
    date: "03/09-2013 - 12:08"
    content: "Ja, hvis man kan finde ud af hvordan de gamle URL&#8217;er bliver genereret på baggrund af produktdata/kategoristruktur/forumopbygning, så ville det være det optimale. Især med sites af denne størrelse :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
