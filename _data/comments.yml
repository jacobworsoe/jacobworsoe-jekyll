  - author: Jacob Wors&oslash;e
    date: "07/04-2010 - 22:28"
    content: "Hej Ricco. Godt du kunne bruge artiklen. Det er rigtigt nok at kvaliteten p&aring; kablet kan v&aelig;re meget forskellig, selvom signalet er det samme. I den test jeg linker til i artiklen pr&oslash;ver de ogs&aring; at b&oslash;je kablet 10.000 gange mens det er i brug, for at se om det kan holde til nogle t&aelig;sk, og det er jo ogs&aring; v&aelig;rd at betale lidt ekstra for. Kablet jeg fik virker perfekt, og jeg regner ikke med at flytte s&aring; meget rundt p&aring; min ops&aelig;tning, s&aring; kablet skal ikke kunne holde til s&aring; meget i min situation. Men hvis man tit flytter rundt p&aring; tingene eller lignende, s&aring; skal man nok k&oslash;be et lidt bedre kabel. Men indtil videre har det k&oslash;rt perfekt."
