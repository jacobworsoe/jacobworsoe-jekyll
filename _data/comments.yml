  - author: Rasmus Henriksen
    date: 04/02-2010 - 03:13
    content: |-
      Hej, først og fremmest vil jeg sige at artiklen som helhed er rigtig god. Den starter endda super godt ud! Jeg føler dog jeg taber tråden undervejs, når vi begynder på "Estimated conversion rate change". "Kombinationen af at begge varianter, med 80% sandsynlighed, har en konverteringsrate som ikke overlapper hinanden giver en sandsynlighed på 95% for at der er forskel på dem." - Hvorfor det? Jeg kan ikke lige se den logiske forklaring på det, eller den matematiske begrundelse for det. For mit vedkommende i hvert fald, er der gennemgående forvirring om hvordan og hvorledes og hvorfor mht. usikkerheden, overlapningen og de barre generelt. Det vil glæde mig hvis du kan specificere det lidt nærmere måske? :) Keep up!
