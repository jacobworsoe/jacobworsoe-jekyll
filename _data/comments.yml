  - author: Jimmy Sigenstr&oslash;m
    date: "30/01-2011 - 23:29"
    content: "Jeg synes det er en god m&aring;de at hvis hvilke man skal bruge og hvilke man skal holde sig fra. Men n&aring;r det s&aring; er sagt, s&aring; har 95% af de linkkataloger som er blevet fjernet selv bedt om det.! Der har l&aelig;nge hersket en eller anden tildens til at man bare skulle have s&aring; mange links som muligt, og s&aring; var det lige meget med double content og sider der ikke var en kop varm pis v&aelig;rd. Jeg h&aring;ber det er i orden at jeg bruger konceptet med de indekseret sider p&aring; http://www.webiq.dk , s&aring; kan de der bruger denne side f&aring; gavn af det ogs&aring;.? I forhold til pagerank, s&aring; er der flere link kataloger som er g&aring;et fra en pr. p&aring; 4 til en p&aring; 0. De link kataloger som er p&aring; WebIQ, der kan man her se den gamle pagerank og den nye hvis man har lyst til det. ps. Siteindex havde 1270 sider p&aring; Google sidst jeg kiggede. ;o)"
