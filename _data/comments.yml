  - author: Jacob Wors&oslash;e
    date: "21/01-2011 - 19:56"
    content: "Jeg kan godt se at jeg ikke har v&aelig;ret god nok til forklare hvad form&aring;let med listen var. Det var nemlig ikke at tr&aelig;kke de gode frem i lyset (for det kan man ikke bare ved at kigge p&aring; antal indekserede sider) men derimod at skabe et overblik over hvilke og hvor mange kataloger der var blevet deindekseret. P&aring; den m&aring;de ved man i hvert fald hvilke katalog der ikke giver nogen v&aelig;rdi at tilmelde sig til. Det har altid v&aelig;ret meget tvivlsomt hvor stor effekt det har at tilmelde sig diverse kataloger, og selvom man tager de &oslash;verste p&aring; listen, s&aring; er der ingen garanti for at det har en effekt p&aring; placeringer. Men hvis man vil undg&aring; at spilde sin tid mere end h&oslash;jst n&oslash;dvendigt, s&aring; kan man holde sig fra de nederste p&aring; listen. Dermed ikke sagt at der er noget at hente &oslash;verst p&aring; listen."
