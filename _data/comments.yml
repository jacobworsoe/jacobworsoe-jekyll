  - author: Britta Nielsen
    date: 27/11-2014 - 21:44
    content: |-
      Dejlig webside og lækre eksempler! Kan i den grad bruges! Jeg har dog et enkelt spørgsmål, som du muligvis allerede svarer på, men det virker bare ikke :( Jeg har lavet tre bokse i en section, som er indrammet i . For at gøre det responsivt vil jeg gerne kunne ændre de tre horisontale bokse til tre kolonner der ligger "ovenpå hinanden", når skærmen formindskes. Giver det mening, og har du et godt råd til hvordan jeg skal gøre? Har forgæves forsøgt med at anvende selectoren 'display', uden held. Mvh. Britta
    avatar_url: https://www.gravatar.com/avatar/3106ec3375cbc22befd13ff21e47dbc4?s=96&d=mm&r=g
    author_url: ''
  - author: Jacob Worsøe
    date: 22/12-2014 - 11:42
    content: |-
      Hej Britta Beklager det sene svar! Det du vil gøre er lige præcis det jeg har gjort her på bloggen, og det er et meget populært trick. Det vigtige her er width. Her på bloggen har jeg to kolonner hvoraf den ene (content) er 66,6% bred og den anden (sidebar) er 33,3% bred. Når de to tilsammen er 100% eller derunder (og der er brugt float: left;) kan de være ved siden af hinanden. Kommer de to over 100% tilsammen vil den til højre blive skubbet ned under den anden, dvs. sidebar bliver skubbet under content. Hvis du har tre kolonner som hver er 33,3% og du gerne vil have dem ovenpå hinanden, skal du sætte dem til 100% og derved vil de blive skubbet ned under hinanden. Håber det giver mening?
    avatar_url: https://www.gravatar.com/avatar/6c0a0aa8df43f6419e1fcbe4c21740c9?s=96&d=mm&r=g
    author_url: https://www.jacobworsoe.dk
