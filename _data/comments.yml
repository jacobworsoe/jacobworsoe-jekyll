  - author: Bjarke Klüwer
    date: 13/05-2015 - 01:05
    content: |-
      Det er en fin erfaring at få - og tak for at du deler den :) Princippet bag, at altid udnytte de virtuelle ejendomme, du har til rådighed, er i værd at huske på. Disse virtuelle ejendomme findes mange steder. Desværre kan de være lidt svære at finde, hvis man ikke aktivt leder efter dem. Her er nogle eksempler på ejendom, som kan udnyttes, f.eks. til at indsamle tilmeldinger til et nyhedsbrev, vise reklamer, opfordre til at "Synes godt om" en gruppe på Facebook, osv.: 1) PS. i emails. 2) Statusopdateringer på Facebook. 3) På takkesider der vises efter tilmelding til f.eks. et nyhedsbrev. 4) Downloadsider. 5) ... og mange andre. Kort sagt: Tænk altid på at brugeren/modtageren/besøgeren aldrig må ledes ind i en blindgyde, men altid blive tilbudt at gøre noget som er i din interesse (og sin egen for den sags skyld).
    avatar_url: https://www.gravatar.com/avatar/f38ff0c3745cc9e5422fb3903c67ea77?s=96&d=mm&r=g
    author_url: http://www.bjarkekluwer.dk
