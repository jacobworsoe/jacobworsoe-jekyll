statistikken-bag-google-website-optimizer:
  - author: Jacob Kildebogaard
    date: 11/12-2009 - 09:05
    content: |-
      Vel talt. Det varmer mit cand.merc.(MAT) hjerte :) Fordi det er blevet så let at lave test og tro at statistikken er på plads, så ser jeg flere og flere tærkrummende konklusioner hos "professionelle". "Testen havde version 1 som vinder med et signifikansniveau på under 70". @Trovatten smed et link omkring test af signifikans. Og hvad ser man her? Signifikansniveau test med niveauer på 85, 90, 95 og 98%. Find tre fejl. Som du skriver, så er 95% det absolut mest gængse niveau. 99% bruges også når man skal være endnu mere sikker på resultatet. Så det er fantastisk at du griber tyren ved hornene og tager emnet op. Man må IKKE tro at 72% er godt nok, det er i al fald på ingen måde statistisk validt. Og det må jo være succeskriteriet.
    avatar_url: https://www.gravatar.com/avatar/03b2c1a256581a73abfdc6367db81182?s=96&d=mm&r=g
    author_url: http://www.webanalytiker.dk
