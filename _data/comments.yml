    author_url: 
  - author: Martin Rieck
    date: "21/04-2010 - 19:09"
    content: "God og interessant test du har lavet. Sejt at man kan finde kabler til 35 kr. Der rent faktisk virker, selv om 20 dage selvf&oslash;lgelig er lidt tid, men det kan godt betale sig ikke at have travlt. Jeg er helt enig, der er ingen grund til at betale kassen for et HDMI kabel. Vi d&oslash;delige kan ikke se forskel p&aring; de billige kabler og de dyre. Det er helt uh&oslash;rt at de store elektronik k&aelig;der, kun har de dyre kabler p&aring; hylderne, men det er helt sikkert en voldsomt god forretning."
