    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Christoffer Steenbeck
    date: "14/01-2015 - 15:36"
    content: "Hej Jacob. Det var da en helt genial guide du kommer med her! De fleste nyere themes man kan købe til WordPress, Magento etc. er heldigvis responsive fra starten af, men funktionaliteten kan hurtigt ryge hvis man ikke forstår teknikken bag og blot koder løs uden tanke på, at nye elementer der tilføjes i ens nyindkøbte responsive theme ligeså skal være responsive&#8230; Endnu engang en fantastisk artikel, som jeg vil vende retur til. Tak :-))"
    avatar_url: "https://secure.gravatar.com/avatar/24b282a0abe49117925bff78ec55220350be06f142044af7dc711a44e65cf0d1?s=96&d=mm&r=g"
    author_url: "http://www.christoffersteenbeck.dk"
  - author: Jacob Worsøe
    date: "22/12-2014 - 11:42"
    content: "Hej Britta Beklager det sene svar! Det du vil gøre er lige præcis det jeg har gjort her på bloggen, og det er et meget populært trick. Det vigtige her er width. Her på bloggen har jeg to kolonner hvoraf den ene (content) er 66,6% bred og den anden (sidebar) er 33,3% bred. Når de to tilsammen er 100% eller derunder (og der er brugt float: left;) kan de være ved siden af hinanden. Kommer de to over 100% tilsammen vil den til højre blive skubbet ned under den anden, dvs. sidebar bliver skubbet under content. Hvis du har tre kolonner som hver er 33,3% og du gerne vil have dem ovenpå hinanden, skal du sætte dem til 100% og derved vil de blive skubbet ned under hinanden. Håber det giver mening?"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Britta Nielsen
    date: "27/11-2014 - 21:44"
    content: "Dejlig webside og lækre eksempler! Kan i den grad bruges! Jeg har dog et enkelt spørgsmål, som du muligvis allerede svarer på, men det virker bare ikke :( Jeg har lavet tre bokse i en section, som er indrammet i . For at gøre det responsivt vil jeg gerne kunne ændre de tre horisontale bokse til tre kolonner der ligger &#8220;ovenpå hinanden&#8221;, når skærmen formindskes. Giver det mening, og har du et godt råd til hvordan jeg skal gøre? Har forgæves forsøgt med at anvende selectoren &#8216;display&#8217;, uden held. Mvh. Britta"
    avatar_url: "https://secure.gravatar.com/avatar/4c7fbec4a62c759437f0ad0d95bc75853b89bc56d771aab701abe1c69026ad58?s=96&d=mm&r=g"
    author_url: 
  - author: Jacob Worsøe
    date: "21/01-2014 - 08:54"
    content: "Hej Mark Tak, fedt den kunne bruges :) Jeg er helt enig i at frameworks er smarte at bruge, men i forhold til at få en forståelse for hvad der skal til for at gøre et statisk design responsivt, synes jeg ikke det vil gøre det mindre mystisk, hvis jeg byggede artiklen på et framework. Hvis jeg forstår dig korrekt? Men det var da en glimrende idé til en follow-up artikel, for at vise hvor nemt man kan lave et responsivt design, hvis man bygger det på et framework."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Mark
    date: "20/01-2014 - 19:03"
    content: "Super fedt indlæg, masser af kvalitet i det, men ikke bare snærten af et framework såsom Skeleton eller Bootstrap? Flere praktiske eksempler der kunne komme in handy, bookmark herfra ;)"
    avatar_url: "https://secure.gravatar.com/avatar/38d471744b86b104618a108a262f58f9db6774461795b1da17d936d8c56ce8e7?s=96&d=mm&r=g"
