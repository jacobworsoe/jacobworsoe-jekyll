  - author: Jacob Worsøe
    date: "23/03-2020 - 15:35"
    content: "Mange tak Christoffer! Ja, det er et kæmpe manuelt arbejde, så det skal helt sikkert automatiseres. I forhold til at det gælder bagudrettet, så det er vigtigt at sige at Refunds kan laves op til 6 måneder efter ordren er lavet, derefter er det ikke længere muligt. Og Refund&#8217;en kommer stadig til at ligge på den dato hvor den blev sendt til GA og ikke datoen for ordren &#8211; så det er bedst at få gjort det så hurtigt som muligt, så det skal automatiseres. Calculated Metrics gælder dog på alt historisk data, så det er fedt!"
