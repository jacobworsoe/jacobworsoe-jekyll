  - author: Rasmus Henriksen
    date: "10/11-2011 - 08:57"
    content: "Hej Jacob Kan se at jeg aldrig fik svaret, det troede jeg nu jeg havde. Tak for dit svar! Og tak for det nye link! :)"
    avatar_url: "https://secure.gravatar.com/avatar/47ad8625561373115ed02517d3a06580acb1a2ec27c68e7b4e6921afa1fb74ac?s=96&d=mm&r=g"
    author_url: "http://rhfreelance.dk"
  - author: Jacob Wors&oslash;e
    date: "16/02-2010 - 14:22"
    content: "Rasmus: Tak for din kommentar og jeg beklager det sene svar. Jeg skal v&aelig;re &aelig;rlig og sige at jeg ikke har haft statistik p&aring; et h&oslash;jt nok niveau til at jeg kan forklare matematikken bag ved de udregningen, men bare forst&aring; hvordan man bruger hypotese-test. Derfor har jeg v&aelig;ret n&oslash;dt til at lave mere eller mindre direkte overs&aelig;ttelser af enkelte dele. Det er taget herfra: &quot;The 80% confidence level is what determines the width of the range. It is what allows us to say, with 95% confidence, that a range that exceeds and does not overlap another range will outperform the other range.&quot; Jeg er dog selv nysgerrig efter at finde ud af mere af den bagved liggende matematik, s&aring; jeg vil lige pr&oslash;ve at skrive en mail til Google og h&oslash;re om de kan komme med en forklaring der er til at forst&aring; :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Rasmus Henriksen
    date: "04/02-2010 - 03:13"
    content: "Hej, f&oslash;rst og fremmest vil jeg sige at artiklen som helhed er rigtig god. Den starter endda super godt ud! Jeg f&oslash;ler dog jeg taber tr&aring;den undervejs, n&aring;r vi begynder p&aring; &quot;Estimated conversion rate change&quot;. &quot;Kombinationen af at begge varianter, med 80% sandsynlighed, har en konverteringsrate som ikke overlapper hinanden giver en sandsynlighed p&aring; 95% for at der er forskel p&aring; dem.&quot; &#8211; Hvorfor det? Jeg kan ikke lige se den logiske forklaring p&aring; det, eller den matematiske begrundelse for det. For mit vedkommende i hvert fald, er der gennemg&aring;ende forvirring om hvordan og hvorledes og hvorfor mht. usikkerheden, overlapningen og de barre generelt. Det vil gl&aelig;de mig hvis du kan specificere det lidt n&aelig;rmere m&aring;ske? :) Keep up!"
    avatar_url: "https://secure.gravatar.com/avatar/47ad8625561373115ed02517d3a06580acb1a2ec27c68e7b4e6921afa1fb74ac?s=96&d=mm&r=g"
    author_url: 
  - author: Jacob Wors&oslash;e
    date: "13/12-2009 - 22:17"
    content: "Jeg har forresten lige tilf&oslash;jet artiklen til aNyhed igen. De havde et nedbrud som gjorde at artiklen var blevet slettet fra aNyhed, men nu er det alts&aring; igen muligt at give den en stemme :)"
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Jacob Wors&oslash;e
    date: "13/12-2009 - 22:16"
    content: "Jacob: Jeg vidste det lige var noget for en taln&oslash;rd som dig :) Jeg bliver ogs&aring; selv cand.merc p&aring; et par &aring;r, s&aring; vi har nok en del tilf&aelig;lles p&aring; det punkt. Michael: Tak for rosen. Det er &aelig;rgeligt at du synes den er for teknisk. Jeg havde hele tiden som m&aring;l at g&oslash;re det nemt at forst&aring;, selvom man m&aring;ske ikke kender noget til statistik, men det er &aring;benbart ikke helt lykkedes. Det kan godt v&aelig;re det bare er umuligt med s&aring;dan et emne. Kan du give nogle eksempler p&aring; ting der var lidt sv&aelig;re at forst&aring;? Kurt: Tak for det, jeg er glad for at den satte nogle tanker igang."
    avatar_url: "https://secure.gravatar.com/avatar/69c631a63cc09008a755312332e5638c19141aaec9a9f716dd9ba31edf5ae55e?s=96&d=mm&r=g"
    author_url: "https://www.jacobworsoe.dk"
  - author: Kurt Moskj&aelig;r Andersen
    date: "11/12-2009 - 10:57"
    content: "Rigtig god artikel, som giver stof til eftertanke."
    avatar_url: "https://secure.gravatar.com/avatar/9e130d8b62be7fec4e286b39ae1de8f999b7d3257578a6a875cff6fb8ca3437a?s=96&d=mm&r=g"
    author_url: "http://www.moskjaer.dk"
  - author: Michael Kjeldsen
    date: "11/12-2009 - 10:22"
    content: "Super god gennemgang af vigtigheden ved at lade eksperimenterne l&oslash;be til ende. Alle der arbejder professionelt med split-tests burde l&aelig;se den igennem. Desv&aelig;rre er den nok bare for teknisk til at videresende til k&oslash;bm&aelig;nd uden statistisk/matematisk baggrund, der har ALT for travlt med at f&aring; implementeret &aelig;ndringerne ;-)"
    avatar_url: "https://secure.gravatar.com/avatar/073825231cab21019a8de63b5382c97410983809fcf801eaaec2479d39be2216?s=96&d=mm&r=g"
    author_url: "http://michaelkjeldsen.com/"
  - author: Jacob Kildebogaard
    date: "11/12-2009 - 09:05"
    content: "Vel talt. Det varmer mit cand.merc.(MAT) hjerte :) Fordi det er blevet s&aring; let at lave test og tro at statistikken er p&aring; plads, s&aring; ser jeg flere og flere t&aelig;rkrummende konklusioner hos &quot;professionelle&quot;. &quot;Testen havde version 1 som vinder med et signifikansniveau p&aring; under 70&quot;. @Trovatten smed et link omkring test af signifikans. Og hvad ser man her? Signifikansniveau test med niveauer p&aring; 85, 90, 95 og 98%. Find tre fejl. Som du skriver, s&aring; er 95% det absolut mest g&aelig;ngse niveau. 99% bruges ogs&aring; n&aring;r man skal v&aelig;re endnu mere sikker p&aring; resultatet. S&aring; det er fantastisk at du griber tyren ved hornene og tager emnet op. Man m&aring; IKKE tro at 72% er godt nok, det er i al fald p&aring; ingen m&aring;de statistisk validt. Og det m&aring; jo v&aelig;re succeskriteriet."
    avatar_url: "https://secure.gravatar.com/avatar/ad03261d4d53bcf77d8916301be5e558e4a70e08a0d6182508283565608af02d?s=96&d=mm&r=g"
    author_url: "http://www.webanalytiker.dk"

