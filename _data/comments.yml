  - author: Jimmy
    date: "12/01-2013 - 20:15"
    content: "@Martin effekten af at tilmelde sig til et link katalog, afh&aelig;nger meget af v&aelig;rdien af link kataloget men det vil v&aelig;re en fordel at bruge mulighederne for at f&aring; flere links p&aring; samme katalog i stedet fr blot et. Det samme g&aelig;lder hvis du kommentere p&aring; blogs, et link har meget lille v&aelig;rdi men flere links har langt mere v&aelig;rdi. Mine egne erfaringer er at flere links fra samme dom&aelig;ne har mere v&aelig;rdi end 1 link fra for mange sider. Det vil sige at 2 eller 3 links fra 10 dom&aelig;ner, er bedre end 1 link fra m&aring;ske dom&aelig;ner 25. Og jo st&oslash;rre v&aelig;rdi jo bedre, her mener jeg b&aring;de page rank, indekseret sider og hvor tit google kommer forbi, og siden placering p&aring; google."
