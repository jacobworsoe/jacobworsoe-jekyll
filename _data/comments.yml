    content: |-
      God artikel. Folk lader sig ofte snyde af denne slags vrøvl. Jeg vil dog sige, at selvom selve signalet ikke kan være forskellige grader af godt, så er der andre ting ved et kabel som kan øge prisen. For eksempel vil man jo gerne, at stikket ikke går i stykker første gang man prøver at montere det. Kablet på billedet ser ud til at være af helt OK kvalitet. Godt køb?
    avatar_url: https://www.gravatar.com/avatar/5a1b964e34cc2b1d3e233fa387b791b0?s=96&d=mm&r=g
    author_url: ''
  - author: Jacob Worsøe
    date: 07/04-2010 - 22:28
    content: |-
      Hej Ricco. Godt du kunne bruge artiklen. Det er rigtigt nok at kvaliteten på kablet kan være meget forskellig, selvom signalet er det samme. I den test jeg linker til i artiklen prøver de også at bøje kablet 10.000 gange mens det er i brug, for at se om det kan holde til nogle tæsk, og det er jo også værd at betale lidt ekstra for. Kablet jeg fik virker perfekt, og jeg regner ikke med at flytte så meget rundt på min opsætning, så kablet skal ikke kunne holde til så meget i min situation. Men hvis man tit flytter rundt på tingene eller lignende, så skal man nok købe et lidt bedre kabel. Men indtil videre har det kørt perfekt.
    avatar_url: https://www.gravatar.com/avatar/6c0a0aa8df43f6419e1fcbe4c21740c9?s=96&d=mm&r=g
    author_url: https://www.jacobworsoe.dk
