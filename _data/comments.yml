    content: "Personligt frygter jeg ikke at mit katalog bliver smidt ud af Google, da jeg ikke har noget at miste. Men det ville v&aelig;re en skam for alle de som har brugt tid p&aring; at tilmelde deres link + min tid p&aring; at manuelt at godkende/afvise links. Jeg synes ikke at man skal g&aring; og leve i frygt for at blive smidt ud af Google. Hvis det endelig skulle se, s&aring; er der mange andre m&aring;der af skaffe sin trafik p&aring;, og s&aring; vil jeg bruge min tid der i stedet for seo. Faktum er at nogle linkkataloger er d&oslash;de og andre fortsat lever videre. Det interessante er hvad der har v&aelig;ret grund til at visse er blevet slettet, mens andre ikke er?"
