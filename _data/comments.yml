    content: "Ok, men jeg g&aring;r ud fra du mener at HDMI og DVI er samme kvalitet? Hvis jeg husker ret s&aring; er HDMI s&aring;dan set bare DVI + lyd. De fleste computersk&aelig;rme har jo stadig kun DVI og ikke HDMI endnu."
