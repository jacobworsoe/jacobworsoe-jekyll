    content: |-
      Interessant Thomas. Så var min test jo faktisk i den hurtige ende :) Som jeg skrev i indlægget, så er jeg ved at holde øje med et stort site på 200.000 sider. Det blev flyttet den 29. maj, men nu mere end tre måneder senere er der stadig 28.000 sider indekseret på det gamle domæne, så det tyder virkelig på at Google ikke sætter crawl frekvensen op, så de kan få ryddet op i gamle domæner.
