# Jacob Worsøe - Jekyll (static site from WordPress)
title: Jacob Worsøe
description: "Analytics ninja og datanørd"
url: "https://www.jacobworsoe.dk"
baseurl: ""
lang: "da-DK"

# Build
markdown: kramdown
highlighter: rouge
# Match WordPress permalink_structure (from wp_options)
permalink: /:title/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package.json
  - package-lock.json
  - Gruntfile.js
  - scss
  - scripts
  - README.md

# Plugins (GitHub Pages uses a whitelist; add here if using more)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Liquid (lax avoids build failure on undefined/missing variables in content)
liquid:
  error_mode: lax
