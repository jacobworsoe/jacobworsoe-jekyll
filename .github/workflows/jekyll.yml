# Build and deploy Jekyll site to GitHub Pages
# Use _config.yml baseurl (empty). Do not use configure-pages base_path here: this repo is a
# project site, so base_path would be `/jacobworsoe-jekyll`, but the live site is at www.jacobworsoe.dk/ (root).
name: Deploy Jekyll site to Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node (for theme assets)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build (assets + Jekyll)
        env:
          JEKYLL_ENV: production
        run: |
          set -o pipefail
          {
            echo "=== npm install ==="
            npm install
            echo "=== npm run build (Grunt) ==="
            npm run build
            echo "=== Jekyll build ==="
            bundle exec jekyll build
          } 2>&1 | tee jekyll-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-build-log
          path: jekyll-build.log
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
